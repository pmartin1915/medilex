name: Code Quality & Standards

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly quality checks on main branch
    - cron: '0 2 * * 1'  # Monday 2 AM UTC
  workflow_dispatch:

jobs:
  react-native-lint:
    name: React Native Linting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: |
        echo "🔍 Running ESLint for React Native..."
        if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ]; then
          npm run lint || echo "⚠️ Linting found issues"
        else
          echo "⚠️ ESLint configuration not found"
        fi

    - name: Check for React Native anti-patterns
      run: |
        echo "📱 Checking for React Native anti-patterns..."

        # Check for console.log statements
        if grep -r "console\.log\|console\.warn" src/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" | grep -v "test\|spec"; then
          echo "⚠️ Console statements found - remove before production"
        else
          echo "✅ No console statements in source code"
        fi

        # Check for inline styles (performance concern)
        INLINE_STYLES=$(grep -r "style={{" src/ --include="*.js" --include="*.jsx" --include="*.tsx" | wc -l)
        if [ "$INLINE_STYLES" -gt 10 ]; then
          echo "⚠️ Many inline styles found ($INLINE_STYLES) - consider using StyleSheet.create"
        else
          echo "✅ Inline styles usage is reasonable"
        fi

  mobile-code-standards:
    name: Mobile Code Standards
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check data handling patterns
      run: |
        echo "📊 Checking data handling patterns..."

        # Check for AsyncStorage usage
        if grep -r "AsyncStorage" src/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx"; then
          echo "✅ AsyncStorage usage found"

          # Check for proper error handling with AsyncStorage
          if grep -r "AsyncStorage.*try\|AsyncStorage.*catch" src/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" > /dev/null; then
            echo "✅ Error handling found with AsyncStorage"
          else
            echo "⚠️ AsyncStorage may lack error handling"
          fi
        fi

    - name: Check navigation patterns
      run: |
        echo "🧭 Checking navigation patterns..."

        if npm list @react-navigation/native > /dev/null 2>&1; then
          echo "✅ React Navigation installed"

          # Check for proper navigation typing
          if grep -r "NavigationProp\|RouteProp" src/ --include="*.ts" --include="*.tsx" > /dev/null; then
            echo "✅ Navigation typing detected"
          else
            echo "⚠️ Consider adding navigation typing for type safety"
          fi
        fi

    - name: Medical vocabulary validation
      run: |
        echo "🏥 Validating medical vocabulary implementation..."

        # Check for medical data files
        if [ -d "src/data" ] || [ -d "assets/data" ]; then
          echo "✅ Data directory found"

          # Check for medical terminology files
          if find src/ assets/ -name "*vocab*" -o -name "*medical*" -o -name "*terms*" 2>/dev/null | grep -q .; then
            echo "✅ Medical terminology files detected"
          else
            echo "⚠️ Medical terminology files not clearly identified"
          fi
        fi

  performance-check:
    name: Performance Patterns Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check for performance patterns
      run: |
        echo "⚡ Checking for performance anti-patterns..."

        # Check for FlatList usage (recommended for lists)
        if grep -r "FlatList\|SectionList" src/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" > /dev/null; then
          echo "✅ Using optimized list components"
        else
          echo "⚠️ Consider using FlatList for long lists"
        fi

        # Check for useMemo/useCallback usage
        if grep -r "useMemo\|useCallback" src/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" > /dev/null; then
          echo "✅ Performance optimization hooks detected"
        else
          echo "⚠️ Consider using useMemo/useCallback for optimization"
        fi

        # Check for large images
        if [ -d "assets/images" ]; then
          LARGE_IMAGES=$(find assets/images -name "*.png" -o -name "*.jpg" -exec du -k {} \; 2>/dev/null | awk '$1 > 500 {print $0}' | wc -l)
          if [ "$LARGE_IMAGES" -gt 0 ]; then
            echo "⚠️ Found $LARGE_IMAGES images > 500KB - consider optimization"
          else
            echo "✅ Image sizes are reasonable"
          fi
        fi

  accessibility-check:
    name: Mobile Accessibility Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check accessibility patterns
      run: |
        echo "♿ Checking mobile accessibility patterns..."

        # Check for accessibilityLabel usage
        if grep -r "accessibilityLabel" src/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" > /dev/null; then
          echo "✅ Accessibility labels found"
        else
          echo "⚠️ Consider adding accessibility labels"
        fi

        # Check for accessibilityRole
        if grep -r "accessibilityRole" src/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" > /dev/null; then
          echo "✅ Accessibility roles defined"
        else
          echo "⚠️ Consider adding accessibility roles"
        fi

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [react-native-lint, mobile-code-standards, performance-check, accessibility-check]
    if: always()

    steps:
    - name: Quality gate summary
      run: |
        echo "📊 Code Quality Summary"
        echo "======================"
        echo ""

        if [ "${{ needs.react-native-lint.result }}" = "success" ]; then
          echo "✅ React Native Linting: PASSED"
        else
          echo "❌ React Native Linting: FAILED"
        fi

        if [ "${{ needs.mobile-code-standards.result }}" = "success" ]; then
          echo "✅ Mobile Code Standards: PASSED"
        else
          echo "❌ Mobile Code Standards: FAILED"
        fi

        if [ "${{ needs.performance-check.result }}" = "success" ]; then
          echo "✅ Performance Check: PASSED"
        else
          echo "❌ Performance Check: FAILED"
        fi

        if [ "${{ needs.accessibility-check.result }}" = "success" ]; then
          echo "✅ Accessibility Check: PASSED"
        else
          echo "❌ Accessibility Check: FAILED"
        fi

        echo ""
        echo "🎯 Overall Quality Gate: $(if [ "${{ needs.react-native-lint.result }}" = "success" ] && [ "${{ needs.mobile-code-standards.result }}" = "success" ]; then echo "PASSED ✅"; else echo "REVIEW REQUIRED ⚠️"; fi)"
